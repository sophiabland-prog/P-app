<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#faf5f3">
  <title>Period Tracker</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet">
  <style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body { font-family: 'DM Sans', sans-serif; }

.drawing-canvas { touch-action: none; cursor: crosshair; }
.flow-cell { transition: background-color 0.3s ease; }
.period-bar { animation: slideIn 0.4s ease-out; }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.calendar-scroll { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
.calendar-scroll::-webkit-scrollbar { width: 4px; }
.calendar-scroll::-webkit-scrollbar-thumb { background: rgba(200,100,100,0.3); border-radius: 2px; }

.num-box { 
  width: 42px; height: 70px; border-radius: 12px; 
  display: flex; flex-direction: column; align-items: center; justify-content: space-between;
  font-weight: 700; font-size: 16px; cursor: pointer;
  transition: all 0.2s ease; position: relative;
  padding: 6px 4px;
}
.num-box:hover { transform: scale(1.08); }
.num-box-canvas {
  position: relative; width: 100%; height: 40px; border-radius: 12px; object-fit: cover; display: block;
}
.num-box-number {
  position: relative; z-index: 1; margin-top: 4px;
}

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  padding: 10px 20px; border-radius: 10px; font-size: 14px; z-index: 999;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }
@keyframes toastOut { to { opacity: 0; } }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } }

.flow-input {
  width: 100%; height: 100%; border: none; outline: none;
  text-align: center; font-weight: 700; font-size: 13px;
  background: transparent; color: inherit;
}
.flow-input::placeholder { color: rgba(0,0,0,0.15); }
</style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: #faf5f3;"><!-- HEADER: Numbers 1-10 -->
   <div id="header-section" style="background: linear-gradient(135deg, #3d1c1c, #5a2a2a, #3d1c1c); padding: 20px 16px 14px;">
    <h1 id="app-title" style="font-family: 'DM Sans', sans-serif; color: #f5d5c8; font-size: 22px; margin: 0 0 14px 4px;">My Period Tracker</h1>
    <div style="display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;" id="number-header"><!-- Numbers 1-10 generated by JS -->
    </div>
   </div><!-- PREDICTION SUMMARY -->
   <div id="prediction-box" style="margin: 14px 16px 0; padding: 14px 16px; background: #fff; border-radius: 14px; border: 1px solid #f0ddd8; display: none;">
    <div style="font-size: 12px; font-weight: 600; color: #a0645a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;"><i data-lucide="sparkles" style="width:13px;height:13px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>Prediction
    </div>
    <div id="prediction-text" style="font-size: 14px; color: #4a2a24; line-height: 1.5;"></div>
    <div id="logged-so-far-container" style="margin-top: 12px;"></div>
    <div id="similar-cycles-container" style="margin-top: 12px;"></div>
   </div>
   <div id="prediction-week-container" style="margin: 12px 16px 0;"></div><!-- TRACK BUTTON -->
   <div style="padding: 14px 16px 0; text-align: center;"><button id="track-btn" onclick="openCalendar()" style="width: 100%; padding: 14px; border-radius: 14px; border: none; background: linear-gradient(135deg, #c75050, #a03a3a); color: #fff; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; box-shadow: 0 4px 16px rgba(180,60,60,0.25);"> <i data-lucide="calendar" style="width:16px;height:16px;display:inline-block;vertical-align:-3px;margin-right:6px;"></i>Track Period </button>
   </div><!-- STATS SUMMARY -->
   <div id="stats-section" style="margin: 14px 16px 0; display: none;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
     <div style="background: #fff; border-radius: 14px; padding: 14px; border: 1px solid #f0ddd8;">
      <div style="font-size: 11px; color: #a0645a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;">
       Avg Period
      </div>
      <div id="stat-avg-period" style="font-size: 22px; font-weight: 700; color: #4a2a24; margin-top: 4px;">
       —
      </div>
     </div>
     <div style="background: #fff; border-radius: 14px; padding: 14px; border: 1px solid #f0ddd8;">
      <div style="font-size: 11px; color: #a0645a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;">
       Avg Cycle
      </div>
      <div id="stat-avg-cycle" style="font-size: 22px; font-weight: 700; color: #4a2a24; margin-top: 4px;">
       —
      </div>
     </div>
     <div style="background: #fff; border-radius: 14px; padding: 14px; border: 1px solid #f0ddd8;">
      <div style="font-size: 11px; color: #a0645a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;">
       Recent Period
      </div>
      <div id="stat-recent-period" style="font-size: 22px; font-weight: 700; color: #4a2a24; margin-top: 4px;">
       —
      </div>
     </div>
     <div style="background: #fff; border-radius: 14px; padding: 14px; border: 1px solid #f0ddd8;">
      <div style="font-size: 11px; color: #a0645a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;">
       Recent Cycle
      </div>
      <div id="stat-recent-cycle" style="font-size: 22px; font-weight: 700; color: #4a2a24; margin-top: 4px;">
       —
      </div>
     </div>
    </div>
   </div><!-- PERIOD HISTORY BARS -->
   <div id="history-section" style="padding: 14px 16px 20px;">
    <div id="history-title" style="font-size: 13px; font-weight: 700; color: #7a4a44; margin-bottom: 10px; display: none;"><i data-lucide="clock" style="width:13px;height:13px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>Period History
    </div>
    <div id="history-bars"></div>
   </div>
  </div><!-- CALENDAR MODAL -->
  <div id="calendar-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeCalendar()">
   <div style="background: #faf5f3; width: 94%; max-width: 420px; height: 85%; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;"><!-- Sticky number header in calendar -->
    <div style="background: linear-gradient(135deg, #3d1c1c, #5a2a2a); padding: 14px 16px 10px; flex-shrink: 0;">
     <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;"><span style="font-family: 'Playfair Display', serif; color: #f5d5c8; font-size: 18px; font-weight: 700;">Calendar</span> <button onclick="closeCalendar()" style="background: rgba(255,255,255,0.15); border: none; color: #f5d5c8; width: 32px; height: 32px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;"> <i data-lucide="x" style="width:18px;height:18px;"></i> </button>
     </div>
     <div style="display: flex; gap: 5px; justify-content: center;" id="cal-number-header"></div>
    </div><!-- Scrollable months -->
    <div id="calendar-scroll" class="calendar-scroll" style="flex: 1; overflow-y: auto; padding: 10px 14px 20px;">
    </div>
   </div>
  </div><!-- DRAWING MODAL --> <!-- EMOJI STICKER MODAL -->
  <div id="drawing-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeDrawing()">
   <div style="background: #fff; width: 88%; max-width: 380px; border-radius: 20px; padding: 20px; text-align: center; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;">
    <div id="draw-title" style="font-weight: 700; color: #4a2a24; margin-bottom: 12px; font-size: 15px;">
     Draw for Day 1
    </div>
    <div style="margin-bottom: 12px; display: flex; gap: 8px; justify-content: center; flex-shrink: 0;">
     <button onclick="clearCanvas()" style="padding: 8px 14px; border-radius: 8px; border: 1px solid #e0ccc6; background: #fff; color: #7a4a44; font-weight: 600; font-size: 13px; cursor: pointer;">Clear</button> <button onclick="undoDrawing()" style="padding: 8px 14px; border-radius: 8px; border: 1px solid #e0ccc6; background: #fff; color: #7a4a44; font-weight: 600; font-size: 13px; cursor: pointer;">Undo</button>
    </div>
    <canvas id="drawing-canvas" class="drawing-canvas" style="border: 2px solid #f0ddd8; border-radius: 12px; background: transparent; cursor: crosshair; touch-action: none; flex: 1; display: block; width: 100%; height: 300px; margin-bottom: 12px; align-self: center;"></canvas>
    <div style="display: flex; gap: 8px; justify-content: center; flex-shrink: 0;">
     <button onclick="closeDrawing()" style="padding: 10px 20px; border-radius: 10px; border: 1px solid #e0ccc6; background: #fff; color: #7a4a44; font-weight: 600; font-size: 13px; cursor: pointer;">Cancel</button> <button id="save-drawing-btn" onclick="saveDrawing()" style="padding: 10px 20px; border-radius: 10px; border: none; background: linear-gradient(135deg, #c75050, #a03a3a); color: #fff; font-weight: 600; font-size: 13px; cursor: pointer;">Save Drawing</button>
    </div>
   </div>
  </div><!-- LOADING TOAST CONTAINER -->
  <div id="toast-container"></div>
  <script>
// ---- STATE ----
let allRecords = [];
let drawingRecord = null;
let currentDrawingData = '';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ---- DEFAULT CONFIG ----
const defaultConfig = {
  app_title: 'My Period Tracker',
  background_color: '#faf5f3',
  surface_color: '#ffffff',
  text_color: '#4a2a24',
  primary_action_color: '#c75050',
  secondary_action_color: '#a0645a'
};



// ---- LOCAL STORAGE ----
function loadData() {
  try {
    const data = JSON.parse(localStorage.getItem('periodTrackerData') || '[]');
    allRecords = data;
  } catch (e) {
    allRecords = [];
  }

  drawingRecord = allRecords.find(r => r.type === 'drawing');

  renderNumberHeader();
  renderStats();
  renderHistory();
  renderPrediction();
}

function saveData() {
  localStorage.setItem('periodTrackerData', JSON.stringify(allRecords));
}

// Load on start
loadData();

// ---- NUMBER HEADER ----
function renderNumberHeader() {
  const containers = ['number-header', 'cal-number-header'];
  containers.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.children.length === 0) {
      // Build boxes once
      for (let i = 1; i <= 10; i++) {
        const box = document.createElement('div');
        box.className = 'num-box';
        box.dataset.num = i;
        box.style.background = 'rgba(255,255,255,0.12)';
        box.style.color = '#f5d5c8';
        box.style.position = 'relative';
        box.style.overflow = 'hidden';
        box.textContent = i;
        box.onclick = () => openDrawing(i);
        box.title = 'Click to draw';
        el.appendChild(box);
      }
    }
    // Update all boxes with drawings
    for (let i = 1; i <= 10; i++) {
      const box = el.querySelector(`[data-num="${i}"]`);
      if (!box) continue;
      const drawingRecord = allRecords.find(r => r.type === 'drawing' && r.flow_value === i);
      box.innerHTML = '';
      if (drawingRecord && drawingRecord.drawing_data) {
        box.style.background = 'rgba(255,255,255,0.12)';
        const img = document.createElement('img');
        img.className = 'num-box-canvas';
        img.src = drawingRecord.drawing_data;
        img.style.cssText = 'width:100%; height:40px; object-fit:cover; border-radius:12px;';
        img.onerror = () => { img.style.display = 'none'; };
        box.appendChild(img);
      } else {
        box.style.background = 'rgba(255,255,255,0.12)';
      }
      const numLabel = document.createElement('div');
      numLabel.className = 'num-box-number';
      numLabel.style.color = '#f5d5c8';
      numLabel.style.position = 'relative';
      numLabel.style.zIndex = '1';
      numLabel.textContent = i;
      box.appendChild(numLabel);
    }
  });
}

function openDrawing(day) {
  currentDrawingDay = day;
  document.getElementById('draw-title').textContent = `Draw for Day ${day}`;
  document.getElementById('drawing-modal').style.display = 'flex';
  
  // Initialize canvas
  setTimeout(() => {
    const canvas = document.getElementById('drawing-canvas');
    if (!canvas) return;
    
    // Set canvas size
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = Math.min(300, rect.width - 40);
    canvas.height = 300;
    
    canvasContext = canvas.getContext('2d');
    canvasContext.clearRect(0, 0, canvas.width, canvas.height);
    canvasContext.lineCap = 'round';
    canvasContext.lineJoin = 'round';
    canvasContext.lineWidth = 4;
    canvasContext.strokeStyle = '#f5d5c8';
    
    drawingStrokes = [];
    
    // Mouse events
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);
    
    // Touch events
    canvas.addEventListener('touchstart', handleTouch);
    canvas.addEventListener('touchmove', handleTouch);
    canvas.addEventListener('touchend', stopDrawing);
  }, 50);
}

function getPointerPos(event) {
  const canvas = document.getElementById('drawing-canvas');
  const rect = canvas.getBoundingClientRect();
  let clientX = 0;
  let clientY = 0;

  if (event.touches && event.touches[0]) {
    clientX = event.touches[0].clientX;
    clientY = event.touches[0].clientY;
  } else if (event.changedTouches && event.changedTouches[0]) {
    clientX = event.changedTouches[0].clientX;
    clientY = event.changedTouches[0].clientY;
  } else {
    clientX = event.clientX;
    clientY = event.clientY;
  }

  return {
    x: clientX - rect.left,
    y: clientY - rect.top
  };
}

function handleTouch(e) {
  e.preventDefault();
  if (e.type === 'touchend') {
    stopDrawing();
    return;
  }
  const pos = getPointerPos(e);
  const canvas = document.getElementById('drawing-canvas');
  if (e.type === 'touchstart') {
    startDrawing({ clientX: pos.x + canvas.getBoundingClientRect().left, clientY: pos.y + canvas.getBoundingClientRect().top });
  } else {
    draw({ clientX: pos.x + canvas.getBoundingClientRect().left, clientY: pos.y + canvas.getBoundingClientRect().top });
  }
}

function startDrawing(e) {
  isDrawing = true;
  const canvas = document.getElementById('drawing-canvas');
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  drawingStrokes.push({ points: [[x, y]] });
  canvasContext.beginPath();
  canvasContext.moveTo(x, y);
}

function draw(e) {
  if (!isDrawing) return;
  const canvas = document.getElementById('drawing-canvas');
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  if (drawingStrokes.length > 0) {
    drawingStrokes[drawingStrokes.length - 1].points.push([x, y]);
    canvasContext.lineTo(x, y);
    canvasContext.stroke();
  }
}

function stopDrawing() {
  isDrawing = false;
  if (canvasContext) canvasContext.closePath();
}

function clearCanvas() {
  const canvas = document.getElementById('drawing-canvas');
  canvasContext.clearRect(0, 0, canvas.width, canvas.height);
  drawingStrokes = [];
}

function undoDrawing() {
  if (drawingStrokes.length === 0) return;
  drawingStrokes.pop();
  
  // Redraw
  const canvas = document.getElementById('drawing-canvas');
  canvasContext.clearRect(0, 0, canvas.width, canvas.height);
  
  drawingStrokes.forEach(stroke => {
    canvasContext.beginPath();
    const points = stroke.points;
    if (points.length > 0) {
      canvasContext.moveTo(points[0][0], points[0][1]);
      for (let i = 1; i < points.length; i++) {
        canvasContext.lineTo(points[i][0], points[i][1]);
      }
      canvasContext.stroke();
    }
  });
}

function closeDrawing() {
  document.getElementById('drawing-modal').style.display = 'none';
  canvasContext = null;
  drawingStrokes = [];
}

function saveDrawing() {
  const canvas = document.getElementById('drawing-canvas');
  const btn = document.getElementById('save-drawing-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  canvas.toBlob((blob) => {
    const reader = new FileReader();
    reader.onload = () => {
      const drawingData = reader.result;

      const existingIndex = allRecords.findIndex(
        r => r.type === 'drawing' && r.flow_value === currentDrawingDay
      );

      if (existingIndex !== -1) {
        allRecords[existingIndex].drawing_data = drawingData;
      } else {
        allRecords.push({
          type: 'drawing',
          date: '',
          flow_value: currentDrawingDay,
          drawing_data: drawingData
        });
      }

      saveData();
      loadData();

      showToast('Drawing saved! 🎨', '#5a8a5a');
      closeDrawing();

      btn.disabled = false;
      btn.textContent = 'Save Drawing';
    };

    reader.readAsDataURL(blob);
  }, 'image/png', 0.8);
}

     

// ---- CALENDAR ----
function openCalendar() {
  document.getElementById('calendar-modal').style.display = 'flex';
  renderCalendarMonths();
  lucide.createIcons();
  // Scroll to current month
  setTimeout(() => {
    const current = document.querySelector('[data-current-month]');
    if (current) current.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function closeCalendar() {
  document.getElementById('calendar-modal').style.display = 'none';
}

function parseISODate(dateStr) {
  const parts = dateStr.split('-').map(Number);
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

function renderCalendarMonths() {
  const container = document.getElementById('calendar-scroll');
  const now = new Date();
  const flowRecords = allRecords.filter(r => r.type === 'flow');
  const flowMap = {};
  flowRecords.forEach(r => { flowMap[r.date] = r; });

  // Generate 12 months back + current
  const months = [];
  for (let i = -6; i <= 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth() });
  }

  // Only rebuild if needed
  if (container.dataset.built !== 'true') {
    container.innerHTML = '';
    months.forEach(({ year, month }) => {
      const monthDiv = document.createElement('div');
      monthDiv.style.cssText = 'margin-bottom: 20px;';
      if (year === now.getFullYear() && month === now.getMonth()) {
        monthDiv.setAttribute('data-current-month', 'true');
      }
      monthDiv.dataset.ym = `${year}-${month}`;

      const title = document.createElement('div');
      title.style.cssText = 'font-weight: 700; font-size: 15px; color: #4a2a24; margin-bottom: 8px; padding: 4px 0;';
      title.textContent = `${MONTHS[month]} ${year}`;
      monthDiv.appendChild(title);

      // Day headers
      const dayHeader = document.createElement('div');
      dayHeader.style.cssText = 'display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px;';
      DAYS.forEach(d => {
        const dh = document.createElement('div');
        dh.style.cssText = 'text-align: center; font-size: 10px; font-weight: 600; color: #a0645a;';
        dh.textContent = d;
        dayHeader.appendChild(dh);
      });
      monthDiv.appendChild(dayHeader);

      // Days grid
      const grid = document.createElement('div');
      grid.style.cssText = 'display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;';
      grid.dataset.grid = `${year}-${month}`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      for (let e = 0; e < firstDay; e++) {
        const empty = document.createElement('div');
        grid.appendChild(empty);
      }

      const todayOnly = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const cell = document.createElement('div');
        cell.className = 'flow-cell';
        cell.dataset.date = dateStr;
        cell.style.cssText = 'border-radius: 8px; padding: 2px; text-align: center; min-height: 38px; display: flex; flex-direction: column; align-items: center; background: #fff; border: 1px solid #f0ddd8;';

        const dayLabel = document.createElement('div');
        dayLabel.style.cssText = 'font-size: 9px; color: #a0645a; font-weight: 500;';
        dayLabel.textContent = day;
        cell.appendChild(dayLabel);

        const input = document.createElement('input');
        input.type = 'number';
        input.min = '0';
        input.max = '10';
        input.className = 'flow-input';
        input.dataset.date = dateStr;
        input.placeholder = '·';
        input.style.cssText = 'width: 100%; border: none; outline: none; text-align: center; font-weight: 700; font-size: 13px; background: transparent; color: #4a2a24; flex: 1;';

        const existing = flowMap[dateStr];
        const dateValue = parseISODate(dateStr);
        const isFuture = dateValue.getTime() > todayOnly.getTime();

        if (existing && existing.flow_value > 0) {
          input.value = existing.flow_value;
          const intensity = Math.min(existing.flow_value / 10, 1);
          cell.style.background = `rgba(199, 80, 80, ${0.08 + intensity * 0.35})`;
        }

        if (isFuture) {
          input.disabled = true;
          input.placeholder = '–';
          input.title = 'Future dates cannot be tracked';
          cell.style.opacity = '0.6';
          cell.style.cursor = 'not-allowed';
        } else {
          let debounceTimer;
          input.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            const val = parseInt(e.target.value) || 0;
            const clamped = Math.max(0, Math.min(10, val));
            const intensity = clamped > 0 ? Math.min(clamped / 10, 1) : 0;
            cell.style.background = clamped > 0 ? `rgba(199, 80, 80, ${0.08 + intensity * 0.35})` : '#fff';

            debounceTimer = setTimeout(() => saveFlow(dateStr, clamped), 600);
          });
        }

        cell.appendChild(input);
        grid.appendChild(cell);
      }
      monthDiv.appendChild(grid);
      container.appendChild(monthDiv);
    });
    container.dataset.built = 'true';
  } else {
    // Update existing cells
    const todayOnly = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    container.querySelectorAll('.flow-cell').forEach(cell => {
      const dateStr = cell.dataset.date;
      const input = cell.querySelector('input');
      const existing = flowMap[dateStr];
      const dateValue = parseISODate(dateStr);
      const isFuture = dateValue.getTime() > todayOnly.getTime();

      if (existing && existing.flow_value > 0) {
        if (document.activeElement !== input) input.value = existing.flow_value;
        const intensity = Math.min(existing.flow_value / 10, 1);
        cell.style.background = `rgba(199, 80, 80, ${0.08 + intensity * 0.35})`;
      } else {
        if (document.activeElement !== input && !input.value) {
          cell.style.background = '#fff';
        }
      }

      if (isFuture) {
        input.disabled = true;
        input.placeholder = '–';
        input.title = 'Future dates cannot be tracked';
        cell.style.opacity = '0.6';
        cell.style.cursor = 'not-allowed';
      }
    });
  }
}

function saveFlow(dateStr, value) {
  const index = allRecords.findIndex(
    r => r.type === 'flow' && r.date === dateStr
  );

  if (index !== -1) {
    if (value === 0) {
      allRecords.splice(index, 1);
    } else {
      allRecords[index].flow_value = value;
    }
  } else if (value > 0) {
    allRecords.push({
      type: 'flow',
      date: dateStr,
      flow_value: value,
      drawing_data: ''
    });
  }

  saveData();
  loadData();
}

// ---- HISTORY & STATS ----
function getPeriodsFromRecords() {
  const flows = allRecords.filter(r => r.type === 'flow' && r.flow_value > 0)
    .sort((a, b) => a.date.localeCompare(b.date));

  if (flows.length === 0) return [];

  // Group consecutive days into periods
  const periods = [];
  let currentPeriod = [flows[0]];

  for (let i = 1; i < flows.length; i++) {
    const prevDate = new Date(flows[i-1].date);
    const currDate = new Date(flows[i].date);
    const diffDays = (currDate - prevDate) / (1000 * 60 * 60 * 24);

    if (diffDays <= 2) { // Allow 1 gap day
      currentPeriod.push(flows[i]);
    } else {
      periods.push(currentPeriod);
      currentPeriod = [flows[i]];
    }
  }
  periods.push(currentPeriod);
  return periods;
}

function renderStats() {
  const periods = getPeriodsFromRecords();
  const section = document.getElementById('stats-section');

  if (periods.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';

  const periodLengths = periods.map(p => p.length);
  const avgPeriod = (periodLengths.reduce((a, b) => a + b, 0) / periodLengths.length).toFixed(1);

  // Cycle lengths (gap between period starts)
  const cycleLengths = [];
  for (let i = 1; i < periods.length; i++) {
    const prev = new Date(periods[i-1][0].date);
    const curr = new Date(periods[i][0].date);
    cycleLengths.push(Math.round((curr - prev) / (1000 * 60 * 60 * 24)));
  }
  const avgCycle = cycleLengths.length > 0 ? (cycleLengths.reduce((a, b) => a + b, 0) / cycleLengths.length).toFixed(1) : '—';

  document.getElementById('stat-avg-period').textContent = `${avgPeriod} days`;
  document.getElementById('stat-avg-cycle').textContent = avgCycle !== '—' ? `${avgCycle} days` : '—';
  document.getElementById('stat-recent-period').textContent = `${periodLengths[periodLengths.length - 1]} days`;
  document.getElementById('stat-recent-cycle').textContent = cycleLengths.length > 0 ? `${cycleLengths[cycleLengths.length - 1]} days` : '—';
}

function renderHistory() {
  const periods = getPeriodsFromRecords();
  const container = document.getElementById('history-bars');
  const titleEl = document.getElementById('history-title');

  if (periods.length === 0) {
    container.innerHTML = '';
    titleEl.style.display = 'none';
    return;
  }
  titleEl.style.display = 'block';

  // Build history bars from most recent backwards
  let html = '';
  for (let i = periods.length - 1; i >= 0; i--) {
    const period = periods[i];
    const flowNums = period.map(p => p.flow_value).join(', ');
    const startDate = new Date(period[0].date);
    const dateLabel = `${MONTHS[startDate.getMonth()].slice(0,3)} ${startDate.getDate()}`;

    let cycleLabel = '';
    if (i < periods.length - 1) {
      const nextStart = new Date(periods[i + 1][0].date);
      const thisStart = new Date(period[0].date);
      const cycle = Math.round((nextStart - thisStart) / (1000 * 60 * 60 * 24));
      cycleLabel = `${cycle} day cycle`;
    }

    html += `<div class="period-bar" style="background: #fff; border: 1px solid #f0ddd8; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <span style="font-weight: 700; color: #4a2a24; font-size: 13px;">${dateLabel}</span>
          <span style="color: #a0645a; font-size: 12px; margin-left: 8px;">${period.length} days</span>
        </div>
        ${cycleLabel ? `<span style="font-size: 11px; color: #c75050; font-weight: 600; background: rgba(199,80,80,0.08); padding: 3px 8px; border-radius: 6px;">${cycleLabel}</span>` : '<span style="font-size:11px;color:#5a8a5a;font-weight:600;">Most recent</span>'}
      </div>
      <div style="margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap;">
        ${period.map((p, idx) => {
          const intensity = Math.min(p.flow_value / 10, 1);
          return `<div style="width: 28px; height: 28px; border-radius: 7px; background: rgba(199,80,80,${0.15 + intensity * 0.5}); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #4a2a24;">${p.flow_value}</div>`;
        }).join('')}
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

function formatDateLabel(date) {
  const d = new Date(date);
  return `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;
}

function getFlowSimilarity(currentFlows, histFlows) {
  let points = 0;
  let exactMatches = 0;
  let closeMatches = 0;
  const minLen = Math.min(currentFlows.length, histFlows.length);

  for (let j = 0; j < minLen; j++) {
    const diff = Math.abs(currentFlows[j] - histFlows[j]);
    if (diff === 0) {
      points += 1;
      exactMatches++;
    } else if (diff === 1) {
      points += 0.7;
      closeMatches++;
    } else if (diff === 2) {
      points += 0.4;
    } else if (diff === 3) {
      points += 0.2;
    }
  }

  return {
    score: minLen > 0 ? points / minLen : 0,
    exactMatches,
    closeMatches,
    minLen
  };
}

function updateForecastFromMatch(match, currentFlows, todayLoggedValue) {
  const currentIndex = currentFlows.length - 1;
  const forecastMatch = Array(7).fill(null);
  forecastMatch[0] = todayLoggedValue != null ? todayLoggedValue : currentFlows[currentIndex];
  for (let i = 1; i < 7; i++) {
    const index = currentIndex + i;
    forecastMatch[i] = match.period[index] ? match.period[index].flow_value : null;
  }
  
  const forecastContainer = document.getElementById('prediction-week-container');
  forecastContainer.innerHTML = '';
  
  const card = document.createElement('div');
  card.style.cssText = 'border: 1px solid #f0ddd8; border-radius: 14px; background: #fff; padding: 14px;';
  
  const heading = document.createElement('div');
  heading.style.cssText = 'font-size: 13px; font-weight: 700; color: #4a2a24; margin-bottom: 10px;';
  heading.textContent = 'My next week may look like this:';
  card.appendChild(heading);
  
  const grid = document.createElement('div');
  grid.style.cssText = 'display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 6px;';
  
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const startDay = parseISODate(todayStr);
  
  for (let i = 0; i < 7; i++) {
    const day = new Date(startDay);
    day.setDate(startDay.getDate() + i);
    const label = `${DAYS[day.getDay()]}`;
    const cell = document.createElement('div');
    cell.style.cssText = 'border-radius: 12px; padding: 10px 8px; min-height: 74px; display:flex; flex-direction:column; justify-content:flex-start; align-items:center; font-size: 11px; color: #4a2a24; background: rgba(245,245,245,0.9);';
    
    const dayName = document.createElement('div');
    dayName.style.cssText = 'font-size: 10px; font-weight: 700; color: #a0645a; margin-bottom: 6px;';
    dayName.textContent = label;
    cell.appendChild(dayName);
    
    const matchVal = forecastMatch[i];
    
    const valueLine = document.createElement('div');
    valueLine.style.cssText = 'font-size: 18px; font-weight: 700; color: #4a2a24; line-height: 1;';
    valueLine.textContent = matchVal != null ? matchVal : '—';
    cell.appendChild(valueLine);
    
    const smallLine = document.createElement('div');

    cell.appendChild(smallLine);
    
    if (i === 0) {
      cell.style.background = 'rgba(199,80,80,0.12)';
    }
    
    grid.appendChild(cell);
  }
  
  card.appendChild(grid);
  forecastContainer.style.display = 'block';
  forecastContainer.appendChild(card);
}

function renderPrediction() {
  const periods = getPeriodsFromRecords();
  const box = document.getElementById('prediction-box');
  const textEl = document.getElementById('prediction-text');
  const similarContainer = document.getElementById('similar-cycles-container');

  if (periods.length === 0) {
    box.style.display = 'none';
    return;
  }

  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const latest = periods[periods.length - 1];
  const latestStartDate = parseISODate(latest[0].date);
  const latestEndDate = parseISODate(latest[latest.length - 1].date);
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);
  const yesterdayStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
  const todayRecord = allRecords.find(r => r.type === 'flow' && r.date === todayStr);
  const currentFlows = latest.map(p => p.flow_value);
  const currentPatternActive = (!!todayRecord && todayRecord.flow_value > 0) || latestEndDate.getTime() === today.getTime() || latestEndDate.getTime() === yesterday.getTime();

  let bestMatch = null;
  let bestScore = 0;
  let bestMatchMeta = null;
  let similarCycles = [];

  if (currentPatternActive && periods.length > 1) {
    for (let i = periods.length - 2; i >= 0; i--) {
      const histPeriod = periods[i];
      const histFlows = histPeriod.map(p => p.flow_value);
      const similarity = getFlowSimilarity(currentFlows, histFlows);
      const score = similarity.score;

      if (score > bestScore || (score === bestScore && new Date(histPeriod[0].date) > new Date(bestMatch[0]?.date))) {
        bestScore = score;
        bestMatch = histPeriod;
        bestMatchMeta = similarity;
      }

      if (score > 0) {
        similarCycles.push({ period: histPeriod, score, similarity });
      }
    }
  }

  const similarMatches = similarCycles
    .filter(c => c.score >= 0.6)
    .sort((a, b) => new Date(b.period[0].date) - new Date(a.period[0].date));

  let remainingDays = 0;
  const todayLoggedValue = todayRecord ? todayRecord.flow_value : null;
  const forecastMatch = Array(7).fill(null);
  let hasForecast = false;
  let forecastProps = {
    currentPatternActive,
    forecastMatch,
    predictedStart: null,
    showNextWeekNotes: false,
    nextText: '',
    hasForecast,
    todayStr
  };

  if (currentPatternActive && bestMatch && bestScore > 0) {
    const matchFlows = bestMatch.map(p => p.flow_value).join(' → ');
    const matchPercent = Math.round(bestScore * 100);
    const cyclesAgo = periods.length - 1 - periods.findIndex(p => p === bestMatch);
    const cyclesAgoLabel = cyclesAgo === 1 ? '1 cycle ago' : `${cyclesAgo} cycles ago`;
    remainingDays = Math.max(0, bestMatch.length - currentFlows.length);
    const predictedEndDay = new Date(latestEndDate);
    predictedEndDay.setDate(predictedEndDay.getDate() + remainingDays);

    textEl.innerHTML = `Your current pattern <strong>${currentFlows.join(' → ')}</strong> is <strong>${matchPercent}% similar</strong> to a cycle from <strong>${cyclesAgoLabel}</strong> that went: <strong>${matchFlows}</strong>. Based on that match, expect about <strong>${remainingDays}</strong> more day${remainingDays === 1 ? '' : 's'} of flow, finishing around <strong>${formatDateLabel(predictedEndDay)}</strong>.`;

    const currentIndex = currentFlows.length - 1;
    const forecastOffset = todayLoggedValue != null ? 0 : 1;
    forecastMatch[0] = todayLoggedValue != null ? todayLoggedValue : bestMatch[currentIndex + 1]?.flow_value ?? null;
    for (let i = 1; i < 7; i++) {
      const index = currentIndex + i + forecastOffset;
      forecastMatch[i] = bestMatch[index] ? bestMatch[index].flow_value : null;
    }

    forecastProps.forecastMatch = forecastMatch;
    forecastProps.hasForecast = true;
    forecastProps.showNextWeekNotes = true;
    forecastProps.nextText = `This week is likely to continue with ${remainingDays} more flow day${remainingDays === 1 ? '' : 's'} before things calm down.`;
  } else if (!currentPatternActive && periods.length > 1) {
    const lastStart = parseISODate(latest[0].date);
    const priorStart = parseISODate(periods[periods.length - 2][0].date);
    const cycleIntervals = [];
    for (let i = Math.max(1, periods.length - 6); i < periods.length; i++) {
      const prev = parseISODate(periods[i - 1][0].date);
      const curr = parseISODate(periods[i][0].date);
      cycleIntervals.push(Math.round((curr - prev) / (1000 * 60 * 60 * 24)));
    }

    const avgCycle = cycleIntervals.length > 0 ? Math.round(cycleIntervals.reduce((a,b) => a+b, 0) / cycleIntervals.length) : null;
    const lastCycle = Math.round((lastStart - priorStart) / (1000 * 60 * 60 * 24));
    const avgNext = avgCycle !== null ? new Date(lastStart.getTime() + avgCycle * 24 * 60 * 60 * 1000) : null;
    const lastNext = new Date(lastStart.getTime() + lastCycle * 24 * 60 * 60 * 1000);
    const daysUntilAvg = avgCycle !== null ? Math.max(0, Math.round((avgNext - today) / (1000 * 60 * 60 * 24))) : null;
    const daysUntilLast = Math.max(0, Math.round((lastNext - today) / (1000 * 60 * 60 * 24)));

    textEl.innerHTML = `It looks like your last tracked period is over. The next cycle is predicted to start in <strong>${daysUntilAvg}</strong> days (~<strong>${formatDateLabel(avgNext)}</strong>) based on the average of the last 5 cycles, and in <strong>${daysUntilLast}</strong> days (~<strong>${formatDateLabel(lastNext)}</strong>) based on the most recent cycle.`;

    forecastProps.predictedStart = avgNext ? `${avgNext.getFullYear()}-${String(avgNext.getMonth()+1).padStart(2,'0')}-${String(avgNext.getDate()).padStart(2,'0')}` : null;
    const nextIndex = avgNext ? Math.round((avgNext - today) / (1000 * 60 * 60 * 24)) : -1;
    forecastProps.hasForecast = nextIndex >= 0 && nextIndex < 7;
    if (forecastProps.hasForecast && nextIndex >= 0 && nextIndex < 7) {
      forecastMatch[nextIndex] = 'Start';
    }
    forecastProps.showNextWeekNotes = true;
    forecastProps.nextText = avgNext ? `If this keeps pace, the next cycle may begin around <strong>${formatDateLabel(avgNext)}</strong>.` : 'No reliable week forecast available yet.';
  } else {
    textEl.innerHTML = `Your history is still too short to make a strong prediction. Track a few more cycles for better forecasting.`;
    forecastProps.currentPatternActive = false;
    forecastProps.hasForecast = false;
    forecastProps.showNextWeekNotes = false;
  }

  box.style.display = 'block';

  const loggedSection = document.getElementById('logged-so-far-container');
  if (loggedSection) {
    loggedSection.innerHTML = '';
    if (currentFlows.length > 0) {
      const loggedContainer = document.createElement('div');
      loggedContainer.style.cssText = 'border: 1px solid #f0ddd8; border-radius: 14px; background: #fff; padding: 12px;';
      const loggedLabel = document.createElement('div');
      loggedLabel.style.cssText = 'font-size: 11px; font-weight: 700; color: #a0645a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;';
      loggedLabel.textContent = 'Logged so far';
      loggedContainer.appendChild(loggedLabel);
      const flowBoxes = currentFlows.map(f => `<div style="width: 32px; height: 32px; border-radius: 8px; background: rgba(199,80,80,${Math.min(f / 10, 1) * 0.5 + 0.15}); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #4a2a24;">${f}</div>`).join('');
      const loggedBoxes = document.createElement('div');
      loggedBoxes.style.cssText = 'display: flex; gap: 6px; flex-wrap: wrap;';
      loggedBoxes.innerHTML = flowBoxes;
      loggedContainer.appendChild(loggedBoxes);
      loggedSection.appendChild(loggedContainer);
    }
  }

  similarContainer.innerHTML = '';
  if (currentPatternActive && similarMatches.length > 0) {
    const details = document.createElement('details');
    details.style.cssText = 'border: 1px solid #f0ddd8; border-radius: 14px; background: #fff; padding: 12px; margin-top: 12px;';
    const summary = document.createElement('summary');
    summary.textContent = 'Compare similar cycles';
    summary.style.cssText = 'font-weight: 700; cursor: pointer; color: #4a2a24; margin-bottom: 10px;';
    details.appendChild(summary);

    const similarList = document.createElement('div');
    similarList.style.cssText = 'display: grid; gap: 10px; margin-top: 10px;';

    similarMatches.slice(0, 5).forEach((match, matchIdx) => {
      const startLabel = formatDateLabel(match.period[0].date);
      const scoreLabel = Math.round(match.score * 100);
      const periodHtml = match.period.map(p => {
        const intensity = Math.min(p.flow_value / 10, 1);
        return `<div style="width: 28px; height: 28px; border-radius: 7px; background: rgba(199,80,80,${0.15 + intensity * 0.5}); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #4a2a24;">${p.flow_value}</div>`;
      }).join('');

      const item = document.createElement('div');
      item.style.cssText = 'border: 1px solid #f0ddd8; border-radius: 12px; padding: 10px; background: #fff; cursor: pointer; transition: background 0.2s;';
      item.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="font-weight:700;color:#4a2a24;">${startLabel}</span><span style="font-size:11px;color:#c75050;font-weight:700;">${scoreLabel}% match</span></div><div style="display:flex;gap:6px;flex-wrap:wrap;">${periodHtml}</div>`;
      item.onclick = () => {
        updateForecastFromMatch(match, currentFlows, todayLoggedValue);
      };
      item.onmouseover = () => { item.style.background = '#faf5f3'; };
      item.onmouseout = () => { item.style.background = '#fff'; };
      similarList.appendChild(item);
    });

    details.appendChild(similarList);
    similarContainer.appendChild(details);
  }

  renderWeekForecast(forecastProps);
}
